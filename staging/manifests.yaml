---
# Source: cake-app/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: cake-app
  namespace: staging
  labels:
    app: cake-app
    env: staging
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 5000
  selector:
    app: cake-app
---
# Source: cake-app/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cake-app
  namespace: staging
  labels:
    app: cake-app
    env: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cake-app
  template:
    metadata:
      labels:
        app: cake-app
        env: staging
    spec:
      containers:
        - name: app
          image: sven110sugar/cake-app:3409d025b2072389673c260745d03bc3ad89b900
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
