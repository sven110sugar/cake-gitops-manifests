---
# Source: cake-app/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cake-app
  namespace: staging
  labels:
    app: cake-app
    env: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cake-app
  template:
    metadata:
      labels:
        app: cake-app
        env: staging
    spec:
      containers:
        - name: app
          image: sven110sugar/cake-app:dc1b4a8459d291aa66ceb72f955eeeef013abe1b
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
