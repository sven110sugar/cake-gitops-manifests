---
# Source: cake-app/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cake-app
  namespace: dev
  labels:
    app: cake-app
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cake-app
  template:
    metadata:
      labels:
        app: cake-app
        env: dev
    spec:
      containers:
        - name: app
          image: sven110sugar/cake-app:e3fa84b267efb2d4f2671803770aa2108f121a04
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
